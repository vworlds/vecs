name: Publish to npm

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Bump patch version
        run: |
          npm version patch --workspace @vworlds/vecs --no-git-tag-version

      - name: Update package lock
        run: npm install --package-lock-only --ignore-scripts

      - name: Push version bump
        run: |
          git add lib/vecs/package.json package-lock.json
          git commit -m "chore: bump vecs package [skip ci]"
          git push

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish ./lib/vecs --access public
        env:
          NODE_AUTH_TOKEN: ""
